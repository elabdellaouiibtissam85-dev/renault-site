<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Renault Maroc - Projet Étudiant</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white font-sans">
    <nav class="p-5 flex justify-between items-center border-b border-yellow-500">
        <h1 class="text-2xl font-bold text-yellow-500">RENAULT</h1>
        <ul class="flex gap-4">
            <li>Accueil</li>
            <li>Modèles</li>
            <li>Contact</li>
        </ul>
    </nav>

    <header class="text-center py-20 bg-gradient-to-b from-gray-900 to-black">
        <h2 class="text-5xl font-extrabold mb-4">La Révolution Électrique</h2>
        <p class="text-gray-400 mb-8">Découvrez le futur de l'automobile avec Renault.</p>
        <button class="bg-yellow-500 text-black px-6 py-3 rounded-full font-bold">Voir les modèles</button>
    </header>

    <section class="p-10 text-center">
        <img src="https://images.unsplash.com/photo-1669023414166-a4ce7c0feae1?auto=format&fit=crop&q=80&w=1000" alt="Renault" class="rounded-xl mx-auto mb-10 shadow-lg shadow-yellow-500/20">
        <p class="text-xl italic">"Passion for life"</p>
    </section>

    <footer class="p-10 border-t border-gray-800 text-center text-gray-500">
        <p>Projet réalisé par : [ibtissam]</p>
    </footer>
</body>
</html>
